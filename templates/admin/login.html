<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Awadhya Games Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body{
            font-family: Arial;
            background:#111;
            color:white;
            text-align:center;
            margin-top:100px;
        }

        .login-box{
            background:#1c1c1c;
            padding:40px;
            width:300px;
            margin:auto;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px;
            width:100%;
            background:#ff3c3c;
            border:none;
            color:white;
            font-size:16px;
        }
    </style>
</head>

<body>
   

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
    <div class="container">
        <!-- Logo -->
        <a href="/" class="navbar-brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Awadhya Games Studio" class="logo-img">
        </a>

        <!-- Navigation Links -->
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/games">Games</a></li>
            <li><a href="/blog">Blog</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/admin">Admin</a></li>
        </ul>
    </div>
</nav>

<!-- ================= Login ================= -->
<div class="login-box">

<h2>AGS Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

<footer>

<p>© 2026 Awadhya Games Studio</p>

<div class="social">

<a href="#">YouTube</a>
<a href="#">LinkedIn</a>
<a href="#">Twitter</a>
<a href="#">Itch.io</a>

</div>

</footer>

</body>
</html>
