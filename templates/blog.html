{% extends "base.html" %}

{% block content %}



<section class="page-header">
    
    <h1>Studio Blog</h1>
    <p>Development logs and studio updates</p>
</section>

<section class="blog-section">

<div class="blog-grid">

{% for post in posts %}

<div class="blog-card">

<h3>{{ post.title }}</h3>

<p>{{ post.description[:150] }}...</p>

<a href="/blog" class="btn-view">Read More</a>

</div>

{% endfor %}

</div>

</section>

{% endblock %}
