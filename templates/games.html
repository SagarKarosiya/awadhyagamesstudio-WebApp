<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Games | Awadhya Games Studio</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

<div class="container">

<h2 class="logo">Awadhya Games Studio</h2>

<ul class="nav-links">

<li><a href="/">Home</a></li>
<li><a href="/games">Games</a></li>
<li><a href="/blog">Blog</a></li>
<li><a href="/about">About</a></li>
<li><a href="/contact">Contact</a></li>

</ul>

</div>

</nav>


<!-- ================= PAGE HEADER ================= -->

<section class="page-header">

<h1>Our Games</h1>

<p>Explore games developed by Awadhya Games Studio</p>

</section>


<!-- ================= GAMES GRID ================= -->

<section class="games-section">

<div class="container">

<div class="games-grid">

{% for game in games %}

<div class="game-card">

<img src="{{ url_for('static', filename=game.cover.replace('static/','')) }}" alt="{{ game.title }}">

<div class="game-card-content">

<h3>{{ game.title }}</h3>

<p>{{ game.description[:120] }}...</p>

<a href="/game/{{ game.id }}" class="btn-view">View Game</a>

</div>

</div>

{% endfor %}

</div>

</div>

</section>


<!-- ================= FOOTER ================= -->

<footer>

<p>© 2026 Awadhya Games Studio</p>

<div class="social">

<a href="#">YouTube</a>
<a href="#">LinkedIn</a>
<a href="#">Twitter</a>
<a href="#">Itch.io</a>

</div>

</footer>

</body>

</html>
